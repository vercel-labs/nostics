catalogMode: prefer
ignoreWorkspaceRootCheck: true
shellEmulator: true

trustPolicy: no-downgrade
trustPolicyExclude:
  - tinyclip@0.1.13
  - chokidar@4.0.3
  - semver@6.3.1
packages:
  - playground
  - demo-lib
  - docs
  - packages/*
  - examples/*
# Force a single h3 (Nitro 2.13.4 / Nuxt 4.4.8 use v1). Without this, @nuxt/content
# (which does not pin h3) resolves to the h3 v2 RC pulled in by docus/@nuxtjs/mcp-toolkit
# and vite-devtools, breaking server-side queryCollection (event.req.headers.entries).
overrides:
  h3: 1.15.11

catalogs:
  cli:
    '@antfu/eslint-config': ^9.0.0
    '@antfu/ni': ^30.1.0
    '@posva/prompts': ^2.4.4
    '@size-limit/esbuild-why': ^12.1.0
    '@size-limit/preset-small-lib': ^12.1.0
    '@vitejs/devtools': ^0.3.3
    conventional-changelog: ^7.2.0
    conventional-changelog-angular: ^8.3.1
    esbuild: ^0.28.1
    eslint: ^10.5.0
    lint-staged: ^17.0.7
    oxfmt: ^0.54.0
    publint: ^0.3.21
    semver: ^7.8.4
    simple-git-hooks: ^2.13.1
    size-limit: ^12.1.0
    tsdown: ^0.22.2
    typescript: ^6.0.3
    vite: ^8.0.16
    vite-plugin-inspect: 12.0.0-beta.3
    vue-tsc: ^3.3.5
  deps:
    magic-string: ^0.30.21
    oxc-parser: ^0.135.0
    unplugin: ^3.0.0
  docs:
    '@nuxt/fonts': 0.14.0
    '@nuxt/ui': ^4.8.2
    '@vercel/analytics': ^2.0.1
    '@vercel/speed-insights': ^2.0.0
    better-sqlite3: ^12.10.1
    docus: ^5.12.1
    nuxt: ^4.4.8
  inlined:
    '@antfu/utils': ^9.3.0
  playground:
    '@vitejs/plugin-vue': ^6.0.7
    vue: ^3.5.38
  testing:
    '@vitest/coverage-v8': 4.1.8
    '@vitest/ui': 4.1.8
    tsnapi: ^0.3.3
    vitest: ^4.1.8
  types:
    '@types/node': ^25.9.3
    '@types/semver': ^7.7.1
allowBuilds:
  '@parcel/watcher': false
  better-sqlite3: true
  esbuild: false
  sharp: true
  simple-git-hooks: true
  vue-demi: false
