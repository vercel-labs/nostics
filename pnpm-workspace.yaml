catalogMode: prefer

ignoreWorkspaceRootCheck: true

shellEmulator: true

trustPolicy: no-downgrade
packages:
  - playground
  - docs
  - packages/*
  - examples/*
catalog:
  rolldown-plugin-dts-snapshot: ^0.4.0
catalogs:
  cli:
    '@antfu/eslint-config': ^8.1.0
    '@antfu/ni': ^30.0.0
    bumpp: ^11.0.1
    eslint: ^10.2.0
    lint-staged: ^16.4.0
    publint: ^0.3.18
    simple-git-hooks: ^2.13.1
    tsdown: ^0.21.7
    tsx: ^4.21.0
    typescript: ^6.0.2
    vite: ^8.0.7
  inlined:
    '@antfu/utils': ^9.3.0
  testing:
    tinyexec: ^1.1.1
    vitest: ^4.1.3
    vitest-package-exports: ^1.2.0
    yaml: ^2.8.3
  types:
    '@types/node': ^25.5.2
onlyBuiltDependencies:
  - esbuild
  - simple-git-hooks
